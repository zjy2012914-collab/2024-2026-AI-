<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%" style="background-color: #0f172a; font-family: system-ui, sans-serif;">
  <text x="400" y="45" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">全球数据中心 AI 算力芯片估算市场份额 (2025/2026)</text>
  <text x="400" y="70" text-anchor="middle" fill="#94a3b8" font-size="14">数据源：综合各大投资银行与咨询机构调研数据估算</text>

  <!-- Donut Chart -->
  <!-- Outer radius: 120, Inner radius: 75. Center: cx=280, cy=240 -->
  <!-- Nvidia: 85% (Angle: 306). Start: 0, End: 306 -->
  <!-- AMD: 8% (Angle: 28.8). Start: 306, End: 334.8 -->
  <!-- Hyperscaler Custom ASIC: 5% (Angle: 18). Start: 334.8, End: 352.8 -->
  <!-- Others (Intel, Startups, Chinese domestic): 2% (Angle: 7.2). Start: 352.8, End: 360 -->
  
  <g transform="translate(260, 240)">
    <!-- NVIDIA: 85% -->
    <path d="M 0,-120 A 120,120 0 1,1 -97.08,-70.53 L -60.67,-44.08 A 75,75 0 1,0 0,-75 Z" fill="#10b981" />
    
    <!-- AMD: 8% -->
    <path d="M -97.08,-70.53 A 120,120 0 0,1 -51.34,-108.38 L -32.09,-67.74 A 75,75 0 0,0 -60.67,-44.08 Z" fill="#ef4444" />
    
    <!-- Hyperscaler ASIC: 5% -->
    <path d="M -51.34,-108.38 A 120,120 0 0,1 -15.04,-119.05 L -9.4,-74.4 A 75,75 0 0,0 -32.09,-67.74 Z" fill="#3b82f6" />
    
    <!-- Others: 2% -->
    <path d="M -15.04,-119.05 A 120,120 0 0,1 0,-120 L 0,-75 A 75,75 0 0,0 -9.4,-74.4 Z" fill="#e2e8f0" />
    
    <!-- Center text -->
    <circle cx="0" cy="0" r="75" fill="#1e293b" />
    <text x="0" y="-10" text-anchor="middle" fill="#94a3b8" font-size="14">全球 AI 算力</text>
    <text x="0" y="20" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="bold">100%</text>
  </g>

  <!-- Legend and descriptions -->
  <g transform="translate(490, 130)">
    <!-- Legend Item 1 -->
    <rect x="0" y="0" width="18" height="18" fill="#10b981" rx="3" />
    <text x="28" y="15" fill="#f1f5f9" font-size="15" font-weight="bold">NVIDIA (Hopper &amp; Blackwell)</text>
    <text x="28" y="34" fill="#94a3b8" font-size="13">份额: ~85% (稳居垄断地位，凭借CUDA生态屏障)</text>

    <!-- Legend Item 2 -->
    <g transform="translate(0, 55)">
      <rect x="0" y="0" width="18" height="18" fill="#ef4444" rx="3" />
      <text x="28" y="15" fill="#f1f5f9" font-size="15" font-weight="bold">AMD (Instinct MI300/325/350)</text>
      <text x="28" y="34" fill="#94a3b8" font-size="13">份额: ~8% (最大GPU替代方案，在大客户处批量导入)</text>
    </g>

    <!-- Legend Item 3 -->
    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="18" height="18" fill="#3b82f6" rx="3" />
      <text x="28" y="15" fill="#f1f5f9" font-size="15" font-weight="bold">自研 ASIC (Google/Amazon/MSFT/Meta)</text>
      <text x="28" y="34" fill="#94a3b8" font-size="13">份额: ~5% (云巨头推行去Nvidia化，在内部推理占优)</text>
    </g>

    <!-- Legend Item 4 -->
    <g transform="translate(0, 165)">
      <rect x="0" y="0" width="18" height="18" fill="#e2e8f0" rx="3" />
      <text x="28" y="15" fill="#f1f5f9" font-size="15" font-weight="bold">其他 (Intel, 创业公司, 国产替代)</text>
      <text x="28" y="34" fill="#94a3b8" font-size="13">份额: ~2% (Intel Gaudi 3，Cerebras, 华为等国产本土芯片)</text>
    </g>
  </g>
</svg>
