<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%" style="background-color: #0f172a; font-family: system-ui, sans-serif;">
  <text x="500" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">未来五年 (2026-2031) 全球 AI 芯片技术路线图预测</text>
  <text x="500" y="65" text-anchor="middle" fill="#94a3b8" font-size="14">分立代际演进与突破：制程、显存、先进封装三线演进</text>

  <!-- Columns (Years) -->
  <g stroke="#334155" stroke-width="1" stroke-dasharray="4 4">
    <line x1="250" y1="100" x2="250" y2="460" />
    <line x1="500" y1="100" x2="500" y2="460" />
    <line x1="750" y1="100" x2="750" y2="460" />
  </g>

  <!-- Year Labels -->
  <text x="125" y="115" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">2026-2027年</text>
  <text x="375" y="115" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">2028-2029年</text>
  <text x="625" y="115" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">2029-2030年</text>
  <text x="875" y="115" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">2030-2031年</text>

  <!-- Row 1: Process Nodes -->
  <rect x="30" y="140" width="100" height="80" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="4" />
  <text x="80" y="185" fill="#93c5fd" font-size="14" font-weight="bold" text-anchor="middle">先进工艺制程</text>
  
  <g transform="translate(140, 140)">
    <!-- 2026-2027 -->
    <rect x="0" y="5" width="180" height="70" fill="#1e3a8a" stroke="#3b82f6" rx="4" />
    <text x="90" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">3nm (TSMC N3P/N3X)</text>
    <text x="90" y="50" fill="#93c5fd" font-size="11" text-anchor="middle">全面商业化，晶体管暴增</text>
    <line x1="180" y1="40" x2="230" y2="40" stroke="#3b82f6" stroke-width="2" />
    <polygon points="230,37 240,40 230,43" fill="#3b82f6" />
    
    <!-- 2028-2029 -->
    <rect x="240" y="5" width="180" height="70" fill="#1e3a8a" stroke="#3b82f6" rx="4" />
    <text x="330" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">2nm GAA (SF2 / N2)</text>
    <text x="330" y="50" fill="#93c5fd" font-size="11" text-anchor="middle">GAA晶体管架构成熟应用</text>
    <line x1="420" y1="40" x2="470" y2="40" stroke="#3b82f6" stroke-width="2" />
    <polygon points="470,37 480,40 470,43" fill="#3b82f6" />

    <!-- 2030-2031 -->
    <rect x="480" y="5" width="220" height="70" fill="#311042" stroke="#a855f7" rx="4" />
    <text x="590" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">1.4nm (TSMC A14) [推测]</text>
    <text x="590" y="50" fill="#c084fc" font-size="10" text-anchor="middle">埃米级物理极限突破 / 碳纳米管引入风险</text>
  </g>

  <!-- Row 2: Memory Technology -->
  <rect x="30" y="250" width="100" height="80" fill="#1e293b" stroke="#10b981" stroke-width="1.5" rx="4" />
  <text x="80" y="295" fill="#34d399" font-size="14" font-weight="bold" text-anchor="middle">显存/高密存储</text>

  <g transform="translate(140, 250)">
    <!-- 2026-2027 -->
    <rect x="0" y="5" width="180" height="70" fill="#064e3b" stroke="#10b981" rx="4" />
    <text x="90" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">HBM3e / HBM4</text>
    <text x="90" y="50" fill="#a7f3d0" font-size="11" text-anchor="middle">HBM4引入2048-bit超宽接口</text>
    <line x1="180" y1="40" x2="230" y2="40" stroke="#10b981" stroke-width="2" />
    <polygon points="230,37 240,40 230,43" fill="#10b981" />

    <!-- 2028-2029 -->
    <rect x="240" y="5" width="180" height="70" fill="#064e3b" stroke="#10b981" rx="4" />
    <text x="330" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">HBM4 / HBM4e 3D封装</text>
    <text x="330" y="50" fill="#a7f3d0" font-size="11" text-anchor="middle">显存堆叠直接置于逻辑芯片顶部</text>
    <line x1="420" y1="40" x2="470" y2="40" stroke="#10b981" stroke-width="2" />
    <polygon points="470,37 480,40 470,43" fill="#10b981" />

    <!-- 2030-2031 -->
    <rect x="480" y="5" width="220" height="70" fill="#311042" stroke="#a855f7" rx="4" />
    <text x="590" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">HBM5 / 光电存算一体 [不确定]</text>
    <text x="590" y="50" fill="#c084fc" font-size="10" text-anchor="middle">光子读写、片上超大统一非易失存储</text>
  </g>

  <!-- Row 3: Packaging and Interconnect -->
  <rect x="30" y="360" width="100" height="80" fill="#1e293b" stroke="#f97316" stroke-width="1.5" rx="4" />
  <text x="80" y="405" fill="#fb923c" font-size="14" font-weight="bold" text-anchor="middle">先进封装与互联</text>

  <g transform="translate(140, 360)">
    <!-- 2026-2027 -->
    <rect x="0" y="5" width="180" height="70" fill="#7c2d12" stroke="#f97316" rx="4" />
    <text x="90" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">CoWoS / SoIC 混合封装</text>
    <text x="90" y="50" fill="#ffedd5" font-size="11" text-anchor="middle">晶圆级系统（SoW）和硅通孔优化</text>
    <line x1="180" y1="40" x2="230" y2="40" stroke="#f97316" stroke-width="2" />
    <polygon points="230,37 240,40 230,43" fill="#f97316" />

    <!-- 2028-2029 -->
    <rect x="240" y="5" width="180" height="70" fill="#7c2d12" stroke="#f97316" rx="4" />
    <text x="330" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">光子片上网络 (Silicon Photonics)</text>
    <text x="330" y="50" fill="#ffedd5" font-size="11" text-anchor="middle">硅光互联（CPO）替换部分铜铜物理链路</text>
    <line x1="420" y1="40" x2="470" y2="40" stroke="#f97316" stroke-width="2" />
    <polygon points="470,37 480,40 470,43" fill="#f97316" />

    <!-- 2030-2031 -->
    <rect x="480" y="5" width="220" height="70" fill="#311042" stroke="#a855f7" rx="4" />
    <text x="590" y="32" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">全光交换网络（OCS）光算一体 [不确定]</text>
    <text x="590" y="50" fill="#c084fc" font-size="10" text-anchor="middle">全硅光子交换机，算力扩展至百万级无阻卡群</text>
  </g>
</svg>
