<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background-color: #0f172a; font-family: system-ui, sans-serif;">
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">AI 芯片显存容量与内存带宽对比</text>
  <text x="400" y="65" text-anchor="middle" fill="#94a3b8" font-size="14">柱状高度代表显存容量 (GB)，圆点位置代表显存带宽 (TB/s)</text>

  <!-- Legend -->
  <g transform="translate(580, 20)">
    <rect x="0" y="0" width="15" height="15" fill="#3b82f6" rx="2" />
    <text x="22" y="13" fill="#94a3b8" font-size="12">显存容量 (GB)</text>
    <circle cx="150" cy="8" r="6" fill="#f59e0b" />
    <text x="162" y="13" fill="#94a3b8" font-size="12">显存带宽 (TB/s)</text>
  </g>

  <!-- Left Y-Axis (GB Scale) -->
  <line x1="80" y1="100" x2="80" y2="420" stroke="#475569" stroke-width="2" />
  <text x="70" y="105" fill="#94a3b8" font-size="12" text-anchor="end">300 GB</text>
  <text x="70" y="180" fill="#94a3b8" font-size="12" text-anchor="end">200 GB</text>
  <text x="70" y="260" fill="#94a3b8" font-size="12" text-anchor="end">100 GB</text>
  <text x="70" y="340" fill="#94a3b8" font-size="12" text-anchor="end">50 GB</text>
  <text x="70" y="420" fill="#94a3b8" font-size="12" text-anchor="end">0 GB</text>

  <!-- Right Y-Axis (TB/s Scale) -->
  <line x1="720" y1="100" x2="720" y2="420" stroke="#475569" stroke-width="2" />
  <text x="730" y="105" fill="#94a3b8" font-size="12" text-anchor="start">10.0 TB/s</text>
  <text x="730" y="180" fill="#94a3b8" font-size="12" text-anchor="start">7.5 TB/s</text>
  <text x="730" y="260" fill="#94a3b8" font-size="12" text-anchor="start">5.0 TB/s</text>
  <text x="730" y="340" fill="#94a3b8" font-size="12" text-anchor="start">2.5 TB/s</text>
  <text x="730" y="420" fill="#94a3b8" font-size="12" text-anchor="start">0.0 TB/s</text>

  <!-- Horizontal Grid -->
  <g stroke="#334155" stroke-width="0.5" stroke-dasharray="4 4">
    <line x1="80" y1="100" x2="720" y2="100" />
    <line x1="80" y1="180" x2="720" y2="180" />
    <line x1="80" y1="260" x2="720" y2="260" />
    <line x1="80" y1="340" x2="720" y2="340" />
  </g>

  <!-- Data Groups (X locations: 130, 210, 290, 370, 450, 530, 610, 690) -->
  <!-- Formula Capacity Height: y = 420 - (Cap / 300) * 320 -->
  <!-- Formula Bandwidth Height: y = 420 - (BW / 10) * 320 -->

  <!-- 1. H100 (80GB, 3.35 TB/s) -->
  <g transform="translate(110, 0)">
    <rect x="0" y="334" width="30" height="86" fill="#3b82f6" rx="2" />
    <text x="15" y="325" fill="#93c5fd" font-size="11" text-anchor="middle" font-weight="bold">80G</text>
    <circle cx="15" cy="312" r="6" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5" />
    <text x="15" y="298" fill="#fbcfe8" font-size="10" text-anchor="middle">3.35T</text>
    <text x="15" y="440" fill="#f1f5f9" font-size="12" text-anchor="middle" transform="rotate(25, 15, 440)">H100</text>
  </g>

  <!-- 2. H200 (141GB, 4.8 TB/s) -->
  <g transform="translate(190, 0)">
    <rect x="0" y="270" width="30" height="150" fill="#3b82f6" rx="2" />
    <text x="15" y="260" fill="#93c5fd" font-size="11" text-anchor="middle" font-weight="bold">141G</text>
    <circle cx="15" cy="266" r="6" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5" />
    <text x="15" y="252" fill="#fbcfe8" font-size="10" text-anchor="middle">4.8T</text>
    <text x="15" y="440" fill="#f1f5f9" font-size="12" text-anchor="middle" transform="rotate(25, 15, 440)">H200</text>
  </g>

  <!-- 3. B200 (192GB, 8.0 TB/s) -->
  <g transform="translate(270, 0)">
    <rect x="0" y="215" width="30" height="205" fill="#10b981" rx="2" />
    <text x="15" y="205" fill="#34d399" font-size="11" text-anchor="middle" font-weight="bold">192G</text>
    <circle cx="15" cy="164" r="6" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5" />
    <text x="15" y="150" fill="#fbcfe8" font-size="10" text-anchor="middle">8.0T</text>
    <text x="15" y="440" fill="#f1f5f9" font-size="12" text-anchor="middle" transform="rotate(25, 15, 440)">B200</text>
  </g>

  <!-- 4. MI300X (192GB, 5.3 TB/s) -->
  <g transform="translate(350, 0)">
    <rect x="0" y="215" width="30" height="205" fill="#ef4444" rx="2" />
    <text x="15" y="205" fill="#f87171" font-size="11" text-anchor="middle" font-weight="bold">192G</text>
    <circle cx="15" cy="250" r="6" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5" />
    <text x="15" y="236" fill="#fbcfe8" font-size="10" text-anchor="middle">5.3T</text>
    <text x="15" y="440" fill="#f1f5f9" font-size="12" text-anchor="middle" transform="rotate(25, 15, 440)">MI300X</text>
  </g>

  <!-- 5. MI325X (256GB, 6.0 TB/s) -->
  <g transform="translate(430, 0)">
    <rect x="0" y="147" width="30" height="273" fill="#ef4444" rx="2" />
    <text x="15" y="137" fill="#f87171" font-size="11" text-anchor="middle" font-weight="bold">256G</text>
    <circle cx="15" cy="228" r="6" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5" />
    <text x="15" y="214" fill="#fbcfe8" font-size="10" text-anchor="middle">6.0T</text>
    <text x="15" y="440" fill="#f1f5f9" font-size="12" text-anchor="middle" transform="rotate(25, 15, 440)">MI325X</text>
  </g>

  <!-- 6. Gaudi 3 (128GB, 3.7 TB/s) -->
  <g transform="translate(510, 0)">
    <rect x="0" y="283" width="30" height="137" fill="#8b5cf6" rx="2" />
    <text x="15" y="273" fill="#c084fc" font-size="11" text-anchor="middle" font-weight="bold">128G</text>
    <circle cx="15" cy="301" r="6" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5" />
    <text x="15" y="287" fill="#fbcfe8" font-size="10" text-anchor="middle">3.7T</text>
    <text x="15" y="440" fill="#f1f5f9" font-size="12" text-anchor="middle" transform="rotate(25, 15, 440)">Gaudi 3</text>
  </g>

  <!-- 7. Maia 200 (216GB, 7.0 TB/s) -->
  <g transform="translate(590, 0)">
    <rect x="0" y="190" width="30" height="230" fill="#ec4899" rx="2" />
    <text x="15" y="180" fill="#f472b6" font-size="11" text-anchor="middle" font-weight="bold">216G</text>
    <circle cx="15" cy="196" r="6" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5" />
    <text x="15" y="182" fill="#fbcfe8" font-size="10" text-anchor="middle">7.0T</text>
    <text x="15" y="440" fill="#f1f5f9" font-size="12" text-anchor="middle" transform="rotate(25, 15, 440)">Maia 200</text>
  </g>
</svg>
